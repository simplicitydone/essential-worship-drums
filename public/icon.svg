<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" fill="#e4572e"/>
  <!-- drum shell -->
  <ellipse cx="256" cy="330" rx="150" ry="46" fill="#c53d18"/>
  <rect x="106" y="214" width="300" height="116" fill="#f7f1ea"/>
  <ellipse cx="256" cy="214" rx="150" ry="46" fill="#ffffff"/>
  <ellipse cx="256" cy="214" rx="150" ry="46" fill="none" stroke="#c53d18" stroke-width="6"/>
  <!-- tension lugs -->
  <g fill="#d99a12">
    <circle cx="130" cy="272" r="9"/>
    <circle cx="200" cy="292" r="9"/>
    <circle cx="312" cy="292" r="9"/>
    <circle cx="382" cy="272" r="9"/>
    <circle cx="256" cy="298" r="9"/>
  </g>
  <!-- crossed sticks -->
  <g stroke-linecap="round">
    <line x1="150" y1="150" x2="352" y2="250" stroke="#3a2a1c" stroke-width="18"/>
    <line x1="362" y1="150" x2="160" y2="250" stroke="#57422c" stroke-width="18"/>
    <circle cx="150" cy="150" r="13" fill="#3a2a1c"/>
    <circle cx="362" cy="150" r="13" fill="#57422c"/>
  </g>
</svg>
